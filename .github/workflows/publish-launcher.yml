name: Publish Launcher

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-launcher.yml'
      - 'setup/package-launcher.ps1'
      - 'setup/installer/**'
      - 'src/QuarantineLauncher/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-launcher
  cancel-in-progress: true

jobs:
  package-launcher:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Compute launcher version
        id: version
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $dateStamp = Get-Date -Format "yyyyMMdd"
          $fullVersion = "0.1.0-dev.$dateStamp.${{ github.run_number }}-$shortSha"
          $displayVersion = "0.1.0"
          $installerBaseName = "quarantine-launcher-installer-$displayVersion"
          "launcher_version_full=$fullVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "launcher_version_display=$displayVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "launcher_installer_base_name=$installerBaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Publishing launcher version $fullVersion"
          Write-Host "Display version $displayVersion"

      - name: Package launcher
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File ".\setup\package-launcher.ps1" `
            -Version "${{ steps.version.outputs.launcher_version_full }}" `
            -Runtime "win-x64" `
            -Configuration Release

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.launcher_version_full }}"
          $packageRoot = Join-Path $PWD "artifacts\launcher\$version\win-x64"
          $sourceDir = Join-Path $packageRoot "app"
          $outputDir = Join-Path $packageRoot "installer"
          $iconPath = Join-Path $PWD "src\QuarantineLauncher\Assets\QE-Icon.ico"
          $baseName = "${{ steps.version.outputs.launcher_installer_base_name }}"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $isccPath = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $isccPath)) {
            throw "ISCC.exe was not found at $isccPath"
          }

          & $isccPath `
            "/DMyAppVersion=${{ steps.version.outputs.launcher_version_display }}" `
            "/DMyOutputBaseFilename=$baseName" `
            "/DMySourceDir=$sourceDir" `
            "/DMyOutputDir=$outputDir" `
            "/DMyIconPath=$iconPath" `
            ".\setup\installer\QuarantineLauncher.iss"

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup compilation failed with exit code $LASTEXITCODE."
          }

      - name: Upload portable launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarantine-launcher-portable-${{ steps.version.outputs.launcher_version_full }}
          path: artifacts/launcher/${{ steps.version.outputs.launcher_version_full }}/win-x64
          if-no-files-found: error

      - name: Upload launcher installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarantine-launcher-installer-${{ steps.version.outputs.launcher_version_display }}
          path: artifacts/launcher/${{ steps.version.outputs.launcher_version_full }}/win-x64/installer
          if-no-files-found: error
